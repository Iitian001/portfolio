<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9d976" />
      <stop offset="50%" stop-color="#e1b854" />
      <stop offset="100%" stop-color="#b8862d" />
    </linearGradient>
  </defs>
  <!-- Background circle for contrast -->
  <circle cx="50" cy="50" r="48" fill="#0d0d15" stroke="url(#gold)" stroke-width="4" />
  <!-- Monogram S -->
  <text x="50%" y="72%" font-family="'Georgia', serif" font-size="65" font-weight="bold" fill="url(#gold)" text-anchor="middle">S</text>
</svg>